[input]
format = "jsonl"            # text | jsonl | warc | html
paths = ["./data/**/*.jsonl"]
text_field = "text"
meta_fields = ["url", "id"]

[output]
format = "jsonl"            # jsonl | parquet
path = "./out/dataset.jsonl"
write_rejected = true
rejected_path = "./out/dataset.rejected.jsonl"
# shard_max_rows = 1000000  # 設定すると dataset.00000.jsonl, dataset.00001.jsonl ... に分割出力する

[extract]
validate_residual = true
strip_boilerplate = true    # HTML/WARC入力時にnav/footer/広告classなどを除去
markdown = false            # trueでHTML本文をMarkdownに変換（falseはプレーンテキスト抽出）
markdown_keep_headings = true
markdown_keep_lists = true
markdown_keep_links = false

[scoring.language]
allow = ["ja", "en"]
max_mixed_ratio = 0.2

[scoring.text_quality]
max_duplicate_line_ratio = 0.3
max_symbol_ratio = 0.15
perplexity_enabled = false   # trueにする場合は`perplexity` cargo featureとkenlm_model_pathが必須
# kenlm_model_path = "./models/ja.binary"

[scoring.content_quality]
ad_keywords = ["今すぐ購入", "激安", "buy now", "limited offer"]
ad_patterns = ["\\d+%\\s*off"]   # 正規表現も追加可能(大文字小文字を区別しない)
max_ad_keyword_ratio = 0.2
max_seo_spam_score = 0.5
min_naturalness_score = 0.3      # Perplexity無効時でも動く簡易統計ベースのスコア

[filters.thresholds]
reject_on_residual_html = true
reject_on_residual_url = false

# AND/OR/NOTを組み合わせた除外ルール。whenがtrueと評価されたレコードはnameを除外理由として除外される。
[[filters.rules]]
name = "junk_combo"
when = { all = [
    { field = "symbol_digit_ratio", op = "gt", value = 0.3 },
    { field = "duplicate_line_ratio", op = "gt", value = 0.5 },
] }

[[filters.rules]]
name = "unsupported_language_or_residual"
when = { any = [
    { not = { field = "detected_language", op = "in", value = ["ja", "en"] } },
    { field = "has_residual_html", op = "eq", value = true },
] }

# WASMプラグイン(wasmtimeでサンドボックス実行)。
# プラグインは memory をexportし、odc_alloc(len:i32)->i32 と
# odc_run(ptr:i32,len:i32)->i64 (出力ポインタ<<32|出力長) をexportする必要がある。
# JSON入力: {"text":..., "meta":..., "config":...} / JSON出力: {"score":?,"accept":?,"reason":?}
# [[plugins]]
# name = "ad_detector"
# path = "./plugins/ad_detector.wasm"
# config = { sensitivity = "medium" }
# timeout_ms = 100              # 1回の呼び出しの最大実行時間
# memory_limit_bytes = 16777216 # 1回の呼び出しで許容する最大メモリ(16MiB)

[dedup]
exact = true
minhash_lsh = true
similarity_threshold = 0.85   # MinHash推定Jaccard類似度がこれ以上なら近似重複として除外
num_hashes = 128               # MinHashシグネチャの長さ
num_bands = 16                 # LSHバンド数(num_hashesを割り切れる必要がある)
shingle_size = 25              # 文字単位n-gramの窓幅

[runtime]
threads = 0                  # 0 = 論理コア数
batch_size = 1000
log_level = "info"
# checkpoint_dir = "./.checkpoints"  # 設定するとファイル単位で再開可能(JSONL出力時のみ対応)

[stats]
output_path = "./out/dataset.stats.json"
format = "json"
