[input]
format = "jsonl"
paths = []

[output]
path = "placeholder.jsonl"
write_rejected = true

[scoring.language]
allow = ["ja", "en"]
max_mixed_ratio = 0.5

[scoring.text_quality]
max_duplicate_line_ratio = 0.5
max_symbol_ratio = 0.9

[filters.thresholds]
reject_on_residual_html = true
reject_on_residual_url = false

[dedup]
exact = true
minhash_lsh = true
similarity_threshold = 0.6
num_hashes = 64
num_bands = 16
shingle_size = 8

[runtime]
threads = 2
batch_size = 10
log_level = "warn"

[stats]
format = "json"
